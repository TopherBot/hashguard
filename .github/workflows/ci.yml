name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.2
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@f44f0cd65c05bd4d31f4a6ee7a2d7c9c8422b2ff # v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run ruff
        run: ruff check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.2
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@f44f0cd65c05bd4d31f4a6ee7a2d7c9c8422b2ff # v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt
      - name: Run pytest
        run: pytest --junitxml=results.xml
      - name: Upload test results
        uses: actions/upload-artifact@f4c0f6c5d0b74c59f4c4e462a1d9cfb6c8c2f3d9 # v4
        with:
          name: pytest-results
          path: results.xml
